# site properties and page defaults
title: Webster Lab
subtitle: The Primate Evolution and Genomics Lab (PEGL)
description: The Primate Evolution and Genomics Lab (Webster Lab) in the Department of Anthropology at the University of Utah uses computational and genomic approaches to investigate evolution, ecology, and behavior.
header: none
footer: none
proofer: false

# site social media and other links
links:
  email: timothy.h.webster@utah.edu
  orcid: 0000-0003-1174-2395
  google-scholar: vpKbTXgAAAAJ
  github: thw17
  bluesky: timwebster.bsky.social
#  youtube: thw17

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
