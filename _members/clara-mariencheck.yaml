Clara received undergraduate degrees in Anthropology and Spanish from Washington University in St. Louis in 2020. While there, she worked with Emily Wroblewski on population genetic research projects involving MHC composition in wild chimpanzees. She is now a PhD candidate at the George Washington University working with Brenda Bradley in the Primate Genomics Lab. Her research interests include primate genomics and ecology, specifically immunogenetics and sex differences in immunocompetence.